<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 追星學西語</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap');

:root {
  --bg: #0d0b1a;
  --surface: #161229;
  --surface2: #1e1a35;
  --surface3: #252040;
  --accent: #7c6af5;
  --accent2: #a78bfa;
  --accent3: #c4b5fd;
  --gold: #f5c67c;
  --green: #4ade80;
  --red: #f87171;
  --text: #e8e4ff;
  --text2: #a89fd4;
  --text3: #6b64a0;
  --border: #2a2350;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding-bottom: 90px;
  overflow-x: hidden;
}

/* ─── SONG PICKER ─── */
.song-picker {
  padding: 20px 16px 0;
  overflow-x: auto;
  display: flex;
  gap: 10px;
  scrollbar-width: none;
}
.song-picker::-webkit-scrollbar { display: none; }

.song-chip {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  min-width: 130px;
}
.song-chip.active {
  border-color: var(--accent);
  background: rgba(124,106,245,0.12);
  box-shadow: 0 0 16px rgba(124,106,245,0.2);
}
.song-chip-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 120px;
}
.song-chip-artist {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}
.song-chip-done {
  font-size: 10px;
  color: var(--green);
  margin-top: 3px;
}

/* ─── HEADER ─── */
.header {
  background: linear-gradient(180deg, #1a1530 0%, var(--bg) 100%);
  padding: 24px 20px 16px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.header-artist { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent2); margin-bottom: 4px; font-weight: 600; }
.header-title { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.header-sub { font-size: 11px; color: var(--text3); margin-bottom: 12px; }

/* ─── PROGRESS ─── */
.progress-section { padding: 0 20px; margin-bottom: 4px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 6px; }
.progress-bar-bg { background: var(--surface2); border-radius: 99px; height: 7px; overflow: hidden; }
.progress-bar-fill { background: linear-gradient(90deg, var(--accent), var(--accent2)); height: 100%; border-radius: 99px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 0 10px rgba(124,106,245,0.5); }

/* ─── STATS ─── */
.stats-row { display: flex; gap: 8px; padding: 10px 20px 0; overflow-x: auto; scrollbar-width: none; }
.stats-row::-webkit-scrollbar { display: none; }
.stat-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 11px; font-size: 11px; white-space: nowrap; display: flex; align-items: center; gap: 4px; color: var(--text2); }
.stat-chip.hi { border-color: var(--accent); color: var(--accent3); background: rgba(124,106,245,0.1); }
.stat-chip .num { font-weight: 700; color: var(--gold); font-size: 13px; }
.streak-badge { background: linear-gradient(135deg,#f5c67c22,#f5c67c11); border: 1px solid #f5c67c44; border-radius: 20px; padding: 5px 11px; font-size: 11px; white-space: nowrap; display: none; align-items: center; gap: 4px; color: var(--gold); font-weight: 600; }

/* ─── CONTENT ─── */
.content { padding: 14px 16px 0; }

/* ─── MODE TABS ─── */
.mode-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
.mode-tab { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text3); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
.mode-tab.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 16px rgba(124,106,245,0.35); }

/* ─── SENTENCE CARD ─── */
.sentence-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 10px; position: relative; transition: all 0.3s; }
.sentence-card.correct { border-color: var(--green); background: rgba(74,222,128,0.05); box-shadow: 0 0 16px rgba(74,222,128,0.1); }
.sentence-card.wrong { border-color: var(--red); animation: shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

.sentence-index { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; font-weight: 600; }
.sentence-es { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.4; margin-bottom: 6px; }
.sentence-vocab { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.vocab-tag { background: rgba(167,139,250,0.12); border: 1px solid rgba(167,139,250,0.2); color: var(--accent3); font-size: 10px; padding: 2px 8px; border-radius: 99px; cursor: pointer; transition: all 0.2s; }
.vocab-tag:hover { background: rgba(167,139,250,0.25); }

.ts-btn { display: inline-flex; align-items: center; gap: 3px; background: rgba(124,106,245,0.1); border: 1px solid rgba(124,106,245,0.2); border-radius: 6px; color: var(--accent3); font-size: 10px; font-weight: 600; padding: 3px 8px; cursor: pointer; text-decoration: none; transition: all 0.2s; margin-bottom: 10px; }
.ts-btn:hover { background: rgba(124,106,245,0.25); border-color: var(--accent); }

.translate-label { font-size: 10px; color: var(--text3); margin-bottom: 5px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
.translate-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif; outline: none; transition: all 0.2s; resize: none; }
.translate-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,106,245,0.15); }
.translate-input::placeholder { color: var(--text3); }

.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
.btn-check { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(124,106,245,0.3); }
.btn-check:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-check:active { transform: translateY(0); }
.btn-skip { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); max-width: 70px; }
.btn-audio { background: var(--surface2); color: var(--gold); border: 1px solid rgba(245,198,124,0.2); max-width: 44px; font-size: 15px; }

.answer-reveal { display: none; margin-top: 10px; padding: 10px; border-radius: 10px; background: var(--surface2); border-left: 3px solid var(--accent); }
.answer-reveal.show { display: block; }
.answer-correct-text { color: var(--accent3); font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.answer-notes { color: var(--text2); font-size: 12px; line-height: 1.6; }
.answer-notes strong { color: var(--gold); }

/* YouGlish 語塊標籤 */
.yg-chunk {
  display: inline-block;
  background: rgba(245,198,124,0.12);
  border: 1px solid rgba(245,198,124,0.3);
  border-radius: 6px;
  color: var(--gold);
  font-weight: 700;
  font-size: 12px;
  padding: 1px 7px;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s;
}
.yg-chunk:hover {
  background: rgba(245,198,124,0.25);
  border-color: var(--gold);
  transform: translateY(-1px);
}
.yg-chunk::after {
  content: ' 🔍';
  font-size: 10px;
  opacity: 0.7;
}

.result-badge { display: none; position: absolute; top: 14px; right: 14px; font-size: 18px; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
.result-badge.show { display: block; }
@keyframes popIn { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }

/* ─── SECTION DIVIDER ─── */
.section-divider { text-align: center; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin: 4px 0 10px; display: flex; align-items: center; gap: 8px; }
.section-divider::before,.section-divider::after { content:''; flex:1; height:1px; background:var(--border); }

/* ─── YT BAR ─── */
.yt-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #0f0d1f; border-top: 1px solid var(--border); z-index: 200; transition: all 0.3s ease; }
.yt-bar-mini { display: flex; align-items: center; gap: 10px; padding: 8px 14px 14px; cursor: pointer; }
.yt-thumb-mini { width: 48px; height: 48px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #000; }
.yt-thumb-mini img { width: 100%; height: 100%; object-fit: cover; }
.yt-info { flex: 1; min-width: 0; }
.yt-title { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.yt-artist { font-size: 10px; color: var(--text3); margin-top: 1px; }
.yt-expand-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--accent3); font-size: 11px; font-weight: 700; padding: 7px 11px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
.yt-embed-full { display: none; width: 100%; aspect-ratio: 16/9; }
.yt-embed-full iframe { width: 100%; height: 100%; display: block; border: none; }
.yt-embed-full > div { width: 100%; height: 100%; }
.yt-embed-full.show { display: block; }
.yt-close-bar { text-align: center; padding: 6px; font-size: 11px; color: var(--text3); cursor: pointer; background: #0f0d1f; }
.yt-close-bar:hover { color: var(--accent3); }

/* ─── VOCAB POPUP ─── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
.overlay.show { display: block; }
.vocab-popup { display: none; position: fixed; bottom: 80px; left: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--accent); border-radius: 14px; padding: 14px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,0.5); animation: slideUp 0.25s ease; }
.vocab-popup.show { display: block; }
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.vocab-popup-word { font-family: 'Space Grotesk',sans-serif; font-size: 17px; font-weight: 700; color: var(--accent3); margin-bottom: 4px; }
.vocab-popup-def { color: var(--text2); font-size: 13px; line-height: 1.5; }
.vocab-popup-ex { margin-top: 8px; padding: 7px; background: var(--surface3); border-radius: 8px; font-size: 11px; color: var(--text3); font-style: italic; }
.vocab-close { position: absolute; top: 10px; right: 12px; color: var(--text3); font-size: 17px; cursor: pointer; }

/* ─── XP FLOAT ─── */
.xp-float { position: fixed; font-size: 17px; font-weight: 800; color: var(--gold); pointer-events: none; z-index: 300; animation: floatUp 1.2s ease forwards; text-shadow: 0 0 20px rgba(245,198,124,0.5); }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(1.3)} }

/* ─── WORD UNLOCK ─── */
.word-unlock { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0); background: linear-gradient(135deg,#1e1a35,#252040); border: 1px solid var(--accent); border-radius: 18px; padding: 20px 28px; text-align: center; z-index: 400; box-shadow: 0 20px 60px rgba(0,0,0,0.7),0 0 40px rgba(124,106,245,0.2); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1),opacity 0.3s; opacity: 0; pointer-events: none; }
.word-unlock.show { transform: translate(-50%,-50%) scale(1); opacity: 1; }
.word-unlock-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent2); margin-bottom: 5px; }
.word-unlock-word { font-family: 'Space Grotesk',sans-serif; font-size: 24px; font-weight: 800; color: var(--gold); margin-bottom: 3px; }
.word-unlock-def { font-size: 13px; color: var(--text2); }

/* ─── COMPLETE ─── */
.complete-screen { display: none; text-align: center; padding: 36px 20px; }
.complete-screen.show { display: block; }
.complete-emoji { font-size: 56px; margin-bottom: 14px; animation: bounce 1s ease infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
.complete-title { font-family: 'Space Grotesk',sans-serif; font-size: 24px; font-weight: 800; background: linear-gradient(135deg,var(--accent2),var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
.complete-stats { display: flex; justify-content: center; gap: 24px; margin: 18px 0; }
.complete-stat-num { font-size: 32px; font-weight: 800; color: var(--gold); line-height: 1; }
.complete-stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
.btn-restart { background: linear-gradient(135deg,var(--accent),#9b5cf8); color: white; border: none; padding: 12px 28px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px; box-shadow: 0 8px 24px rgba(124,106,245,0.35); transition: all 0.2s; }
.btn-restart:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(124,106,245,0.5); }
.btn-next-song { background: var(--surface2); color: var(--accent3); border: 1px solid var(--border); padding: 12px 28px; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: all 0.2s; display: block; width: fit-content; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="header-artist" id="h-artist">🎵 載入中...</div>
  <div class="header-title" id="h-title">追星學西語</div>
  <div class="header-sub" id="h-sub"></div>
  <div class="progress-section">
    <div class="progress-meta">
      <span id="progress-text">第 1 句</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
</div>

<div class="stats-row">
  <div class="stat-chip hi">🎯 正確 <span class="num" id="stat-correct">0</span></div>
  <div class="stat-chip">📚 單字 <span class="num" id="stat-words">0</span></div>
  <div class="stat-chip">⚡ 連勝 <span class="num" id="stat-streak">0</span></div>
  <div class="streak-badge" id="streak-badge">🔥 <span id="streak-num">0</span> 連勝！</div>
</div>

<!-- Song Picker -->
<div class="song-picker" id="song-picker"></div>

<div class="content">
  <div style="margin-top:14px"></div>
  <div class="mode-tabs">
    <div class="mode-tab active" onclick="setMode('translate')" id="tab-translate">✏️ 翻譯模式</div>
    <div class="mode-tab" onclick="setMode('listen')" id="tab-listen">👀 看答案模式</div>
  </div>
</div>

<div id="cards-container" style="padding:0 16px;"></div>
<div class="complete-screen" id="complete-screen">
  <div class="complete-emoji">🏆</div>
  <div class="complete-title" id="complete-title">這首歌學完了！</div>
  <div style="color:var(--text2);font-size:13px;" id="complete-sub"></div>
  <div class="complete-stats">
    <div class="complete-stat"><div class="complete-stat-num" id="final-correct">0</div><div class="complete-stat-label">句答對</div></div>
    <div class="complete-stat"><div class="complete-stat-num" id="final-words">0</div><div class="complete-stat-label">新單字</div></div>
    <div class="complete-stat"><div class="complete-stat-num" id="final-xp">0</div><div class="complete-stat-label">XP</div></div>
  </div>
  <button class="btn-restart" onclick="restart()">🔄 再練一次</button>
  <button class="btn-next-song" onclick="nextSong()" id="btn-next">下一首 →</button>
</div>

<!-- YT Bar -->
<div class="yt-bar" id="yt-bar">
  <div class="yt-embed-full" id="yt-embed-full">
    <div id="yt-player"></div>
  </div>
  <div class="yt-close-bar" id="yt-close-bar" onclick="togglePlayer()" style="display:none">▼ 收起播放器</div>
  <div class="yt-bar-mini" id="yt-bar-mini" onclick="togglePlayer()">
    <div class="yt-thumb-mini">
      <img id="yt-thumb-img" src="" alt="">
    </div>
    <div class="yt-info">
      <div class="yt-title" id="yt-title-bar">-</div>
      <div class="yt-artist" id="yt-artist-bar">-</div>
    </div>
    <div class="yt-expand-btn">▶ 展開播放</div>
  </div>
</div>

<!-- Vocab Popup -->
<div class="overlay" id="overlay" onclick="closeVocab()"></div>
<div class="vocab-popup" id="vocab-popup">
  <div class="vocab-close" onclick="closeVocab()">✕</div>
  <div class="vocab-popup-word" id="vp-word"></div>
  <div class="vocab-popup-def" id="vp-def"></div>
  <div class="vocab-popup-ex" id="vp-ex"></div>
</div>

<div class="word-unlock" id="word-unlock">
  <div class="word-unlock-label">✨ 新單字解鎖</div>
  <div class="word-unlock-word" id="wu-word"></div>
  <div class="word-unlock-def" id="wu-def"></div>
</div>

<script>
const SONGS = [
  {
    id: "cura",
    title: "Cura pa mi alma",
    artist: "Vera GRV",
    zh: "治癒我靈魂的藥",
    ytId: "lZPurmEclzk",
    sections: { 0:"🎵 Verso 1", 5:"🎶 Estribillo", 6:"🎵 Verso 2", 11:"🎶 Estribillo", 13:"🔚 Outro" },
    sentences: [
      { es:"Me di cuenta que sé querer de verdad", zh:"我意識到我真的懂得如何愛", ts:18, notes:"[me di cuenta] = 我意識到（過去式） | [sé querer] = 我知道怎麼愛", vocab:[{word:"darse cuenta",def:"意識到、發現",ex:"Me di cuenta de todo."},{word:"querer de verdad",def:"真心地愛",ex:"Te quiero de verdad."}] },
      { es:"Por cómo me has querido", zh:"因為你愛我的方式", ts:24, notes:"[por cómo] = 因為…的方式 | [me has querido] = 你愛了我（現在完成式）", vocab:[{word:"por cómo",def:"因為…的方式",ex:"Por cómo hablas."}] },
      { es:"Aunque la vida duela y el tiempo sepa amargo", zh:"雖然生活會痛，時間嚐起來苦澀", ts:29, notes:"[aunque] = 雖然 | [duela] = 痛（虛擬式） | [sepa amargo] = 嚐起來苦", vocab:[{word:"aunque",def:"雖然、即使",ex:"Aunque llueva, salgo."},{word:"doler",def:"痛、疼痛",ex:"Me duele la cabeza."},{word:"amargo",def:"苦的、苦澀的",ex:"El café es amargo."}] },
      { es:"Me decías que me fije en los milagros", zh:"你過去常告訴我要注意那些奇蹟", ts:37, notes:"[me decías] = 你過去常說（未完成過去式） | [que me fije] = 要我注意（虛擬式）", vocab:[{word:"decir imperfecto",def:"過去常說",ex:"Me decía siempre."},{word:"fijarse en",def:"注意、觀察",ex:"Fíjate bien."},{word:"milagro",def:"奇蹟",ex:"Es un milagro."}] },
      { es:"Aunque la vida duela tienes en tus manos", zh:"即使生活會痛，你把它握在手中", ts:44, notes:"[tienes en tus manos] = 你把它握在手中 | 隱喻：你有能力掌控", vocab:[{word:"tener en manos",def:"掌握在手中",ex:"Lo tienes en tus manos."}] },
      { es:"Cura pa mi alma y ya no la escucho llorar", zh:"治癒我靈魂的藥，讓我再也聽不到她哭泣", ts:51, notes:"[cura pa] = cura para（方言縮寫） | [ya no] = 再也不 | [escucho llorar] = 聽到她哭", vocab:[{word:"ya no",def:"再也不、不再",ex:"Ya no como carne."},{word:"llorar",def:"哭泣",ex:"Lloro a veces."}] },

var currentSongIdx = 0;
var currentMode = "translate";
var checkedCards = new Set();
var unlockedWords = new Set();
var correctCount = 0;
var wordsUnlocked = 0;
var streakCount = 0;
var totalXP = 0;

function getSong() { return SONGS[currentSongIdx]; }

function initSong(idx) {
  currentSongIdx = idx;
  checkedCards.clear();
  unlockedWords.clear();
  correctCount = 0; wordsUnlocked = 0; streakCount = 0; totalXP = 0;
  document.getElementById("complete-screen").classList.remove("show");
  document.getElementById("cards-container").style.display = "";
  document.getElementById("streak-badge").style.display = "none";
  updateHeader();
  updateYTBar();
  updateStats();
  renderPicker();
  renderCards();
  window.scrollTo(0,0);
}

function updateHeader() {
  var s = getSong();
  document.getElementById("h-artist").textContent = "🎵 " + s.artist + " · 西語學習";
  document.getElementById("h-title").textContent = s.title;
  document.getElementById("h-sub").textContent = s.zh;
}

var ytPlayer = null;
var ytReady = false;
var pendingVideoId = null;

// Load YouTube IFrame API
var tag = document.createElement("script");
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player("yt-player", {
    height: "100%",
    width: "100%",
    videoId: pendingVideoId || SONGS[0].ytId,
    playerVars: { rel: 0, modestbranding: 1 },
    events: {
      onReady: function() {
        ytReady = true;
        // 更新縮圖
        updateThumb(pendingVideoId || SONGS[0].ytId);
      }
    }
  });
}

function updateThumb(videoId) {
  document.getElementById("yt-thumb-img").src = "https://img.youtube.com/vi/" + videoId + "/mqdefault.jpg";
}

function updateYTBar() {
  var s = getSong();
  document.getElementById("yt-title-bar").textContent = s.title;
  document.getElementById("yt-artist-bar").textContent = s.artist;
  updateThumb(s.ytId);
  if (ytReady && ytPlayer) {
    ytPlayer.loadVideoById(s.ytId);
    ytPlayer.pauseVideo();
  } else {
    pendingVideoId = s.ytId;
  }
  // 切歌時收起播放器
  document.getElementById("yt-embed-full").classList.remove("show");
  document.getElementById("yt-bar-mini").style.display = "flex";
  document.getElementById("yt-close-bar").style.display = "none";
}

function seekTo(sec) {
  // 展開播放器
  var full = document.getElementById("yt-embed-full");
  if (!full.classList.contains("show")) {
    togglePlayer();
  }
  if (ytReady && ytPlayer) {
    ytPlayer.seekTo(sec, true);
    ytPlayer.playVideo();
  }
}

function togglePlayer() {
  var full = document.getElementById("yt-embed-full");
  var mini = document.getElementById("yt-bar-mini");
  var closeBar = document.getElementById("yt-close-bar");
  var isOpen = full.classList.contains("show");
  if (isOpen) {
    full.classList.remove("show");
    mini.style.display = "flex";
    closeBar.style.display = "none";
  } else {
    full.classList.add("show");
    mini.style.display = "none";
    closeBar.style.display = "block";
  }
}

function renderPicker() {
  var picker = document.getElementById("song-picker");
  picker.innerHTML = "";
  SONGS.forEach(function(s, i) {
    var chip = document.createElement("div");
    chip.className = "song-chip" + (i === currentSongIdx ? " active" : "");
    var title = document.createElement("div");
    title.className = "song-chip-title";
    title.textContent = s.title;
    var artist = document.createElement("div");
    artist.className = "song-chip-artist";
    artist.textContent = s.artist;
    chip.appendChild(title);
    chip.appendChild(artist);
    if (i === currentSongIdx && checkedCards.size > 0) {
      var done = document.createElement("div");
      done.className = "song-chip-done";
      done.textContent = checkedCards.size + "/" + s.sentences.length + " 句";
      chip.appendChild(done);
    }
    chip.onclick = function() { initSong(i); };
    picker.appendChild(chip);
  });
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById("tab-translate").classList.toggle("active", mode === "translate");
  document.getElementById("tab-listen").classList.toggle("active", mode === "listen");
  renderCards();
}

function renderNotes(notes) {
  return notes.replace(/\[([^\]]+)\]/g, function(match, chunk) {
    var word = chunk.trim();
    var url = "https://youglish.com/pronounce/" + encodeURIComponent(word) + "/spanish";
    var a = document.createElement("a");
    a.className = "yg-chunk";
    a.href = url;
    a.target = "_blank";
    a.textContent = chunk + " 🔍";
    return a.outerHTML;
  });
}

function renderCards() {
  var s = getSong();
  var container = document.getElementById("cards-container");
  container.innerHTML = "";

  s.sentences.forEach(function(sent, i) {
    if (s.sections[i]) {
      var div = document.createElement("div");
      div.className = "section-divider";
      div.textContent = s.sections[i];
      container.appendChild(div);
    }

    var isChecked = checkedCards.has(i);
    var card = document.createElement("div");
    card.className = "sentence-card" + (isChecked ? " correct" : "");
    card.id = "card-" + i;

    var tsUrl = "https://www.youtube.com/watch?v=" + s.ytId + "&t=" + sent.ts + "s";
    var tsMins = Math.floor(sent.ts/60);
    var tsSecs = sent.ts % 60;
    var tsLabel = tsMins + ":" + String(tsSecs).padStart(2,"0");

    // Badge
    var badge = document.createElement("div");
    badge.className = "result-badge" + (isChecked ? " show" : "");
    badge.id = "badge-" + i;
    badge.textContent = isChecked ? "✅" : "";
    card.appendChild(badge);

    // Index
    var idx = document.createElement("div");
    idx.className = "sentence-index";
    idx.textContent = "第 " + (i+1) + " 句 / " + s.sentences.length;
    card.appendChild(idx);

    // Spanish
    var esDiv = document.createElement("div");
    esDiv.className = "sentence-es";
    esDiv.textContent = sent.es;
    card.appendChild(esDiv);

    // Vocab tags
    if (sent.vocab.length > 0) {
      var vtDiv = document.createElement("div");
      vtDiv.className = "sentence-vocab";
      sent.vocab.forEach(function(v) {
        var tag = document.createElement("span");
        tag.className = "vocab-tag";
        tag.textContent = v.word.split(" ")[0];
        tag.setAttribute("data-word", v.word);
        tag.setAttribute("data-def", v.def);
        tag.setAttribute("data-ex", v.ex);
        tag.onclick = function() { handleVocabTag(this); };
        vtDiv.appendChild(tag);
      });
      card.appendChild(vtDiv);
    }

    // Timestamp button - seek in player instead of new tab
    var tsBtn = document.createElement("button");
    tsBtn.className = "ts-btn";
    tsBtn.textContent = "▶ " + tsLabel + " 聽這句";
    (function(sec) {
      tsBtn.onclick = function() { seekTo(sec); };
    })(sent.ts);
    card.appendChild(tsBtn);

    if (currentMode === "translate") {
      var tlabel = document.createElement("div");
      tlabel.className = "translate-label";
      tlabel.textContent = "你的翻譯：";
      card.appendChild(tlabel);

      var ta = document.createElement("textarea");
      ta.className = "translate-input";
      ta.id = "input-" + i;
      ta.rows = 2;
      ta.placeholder = "用中文或英文寫下你的理解…";
      if (isChecked) { ta.value = sent.zh; ta.disabled = true; }
      card.appendChild(ta);

      var btnRow = document.createElement("div");
      btnRow.className = "btn-row";

      var btnCheck = document.createElement("button");
      btnCheck.className = "btn btn-check";
      btnCheck.textContent = "✓ 核對答案";
      if (isChecked) { btnCheck.disabled = true; btnCheck.style.opacity = "0.5"; }
      (function(idx){ btnCheck.onclick = function() { checkAnswer(idx); }; })(i);
      btnRow.appendChild(btnCheck);

      var btnAudio = document.createElement("button");
      btnAudio.className = "btn btn-audio";
      btnAudio.textContent = "🔊";
      (function(txt){ btnAudio.onclick = function() { speak(txt); }; })(sent.es);
      btnRow.appendChild(btnAudio);

      var btnSkip = document.createElement("button");
      btnSkip.className = "btn btn-skip";
      btnSkip.textContent = "跳過";
      if (isChecked) { btnSkip.disabled = true; btnSkip.style.opacity = "0.5"; }
      (function(idx){ btnSkip.onclick = function() { skipCard(idx); }; })(i);
      btnRow.appendChild(btnSkip);

      card.appendChild(btnRow);

      var reveal = document.createElement("div");
      reveal.className = "answer-reveal" + (isChecked ? " show" : "");
      reveal.id = "reveal-" + i;

      var revLabel = document.createElement("div");
      revLabel.className = "answer-correct-text";
      revLabel.textContent = "✦ 參考翻譯";
      reveal.appendChild(revLabel);

      var zhDiv = document.createElement("div");
      zhDiv.style.cssText = "font-size:15px;color:var(--accent3);font-weight:600;margin-bottom:5px;";
      zhDiv.textContent = sent.zh;
      reveal.appendChild(zhDiv);

      var notesDiv = document.createElement("div");
      notesDiv.className = "answer-notes";
      notesDiv.innerHTML = renderNotes(sent.notes);
      reveal.appendChild(notesDiv);

      card.appendChild(reveal);

    } else {
      var zhDiv2 = document.createElement("div");
      zhDiv2.style.cssText = "color:var(--text2);font-size:14px;margin:6px 0 8px;";
      zhDiv2.textContent = sent.zh;
      card.appendChild(zhDiv2);

      var notesDiv2 = document.createElement("div");
      notesDiv2.className = "answer-notes";
      notesDiv2.innerHTML = renderNotes(sent.notes);
      card.appendChild(notesDiv2);
    }

    container.appendChild(card);
  });
}

function checkAnswer(i) {
  var input = document.getElementById("input-" + i);
  if (!input || !input.value.trim()) {
    if (input) { input.style.borderColor = "var(--red)"; setTimeout(function(){ input.style.borderColor = ""; }, 800); }
    return;
  }
  var s = getSong();
  checkedCards.add(i);
  correctCount++;
  streakCount++;
  totalXP += 10 + (streakCount >= 3 ? 5 : 0);

  var card = document.getElementById("card-" + i);
  card.classList.add("correct");
  var badge = document.getElementById("badge-" + i);
  badge.textContent = "✅";
  badge.classList.add("show");
  document.getElementById("reveal-" + i).classList.add("show");
  input.value = s.sentences[i].zh;
  input.disabled = true;

  s.sentences[i].vocab.forEach(function(v) {
    if (!unlockedWords.has(v.word)) {
      unlockedWords.add(v.word);
      wordsUnlocked++;
      showWordUnlock(v.word, v.def);
    }
  });

  updateStats();
  showXP("+10 XP", card, false);
  if (streakCount >= 3) showXP("🔥 +5", card, true);
  if (checkedCards.size === s.sentences.length) setTimeout(showComplete, 800);
}

function skipCard(i) {
  var s = getSong();
  checkedCards.add(i);
  streakCount = 0;
  var badge = document.getElementById("badge-" + i);
  badge.textContent = "💡";
  badge.classList.add("show");
  var reveal = document.getElementById("reveal-" + i);
  if (reveal) reveal.classList.add("show");
  var input = document.getElementById("input-" + i);
  if (input) { input.value = s.sentences[i].zh; input.disabled = true; }
  updateStats();
  if (checkedCards.size === s.sentences.length) setTimeout(showComplete, 800);
}

function updateStats() {
  var s = getSong();
  var pct = Math.round((checkedCards.size / s.sentences.length) * 100);
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("progress-text").textContent = "第 " + Math.min(checkedCards.size+1, s.sentences.length) + " 句，共 " + s.sentences.length + " 句";
  document.getElementById("stat-correct").textContent = correctCount;
  document.getElementById("stat-words").textContent = wordsUnlocked;
  document.getElementById("stat-streak").textContent = streakCount;
  if (streakCount >= 3) {
    var b = document.getElementById("streak-badge");
    b.style.display = "flex";
    document.getElementById("streak-num").textContent = streakCount;
  }
  renderPicker();
}

function showXP(text, el, bonus) {
  var xp = document.createElement("div");
  xp.className = "xp-float";
  xp.textContent = text;
  xp.style.color = bonus ? "var(--gold)" : "var(--accent3)";
  var rect = el.getBoundingClientRect();
  xp.style.left = (rect.left + rect.width/2 - 25) + "px";
  xp.style.top = (rect.top + window.scrollY - 10) + "px";
  document.body.appendChild(xp);
  setTimeout(function(){ xp.remove(); }, 1200);
}

var wuTimer;
function showWordUnlock(word, def) {
  clearTimeout(wuTimer);
  document.getElementById("wu-word").textContent = word;
  document.getElementById("wu-def").textContent = def;
  var wu = document.getElementById("word-unlock");
  wu.classList.add("show");
  wuTimer = setTimeout(function(){ wu.classList.remove("show"); }, 2000);
}

function handleVocabTag(el) {
  showVocab(el.getAttribute("data-word"), el.getAttribute("data-def"), el.getAttribute("data-ex"));
}

function showVocab(word, def, ex) {
  document.getElementById("vp-word").textContent = word;
  document.getElementById("vp-def").textContent = def;
  document.getElementById("vp-ex").textContent = ex;
  document.getElementById("vocab-popup").classList.add("show");
  document.getElementById("overlay").classList.add("show");
}

function closeVocab() {
  document.getElementById("vocab-popup").classList.remove("show");
  document.getElementById("overlay").classList.remove("show");
}

function speak(text) {
  var u = new SpeechSynthesisUtterance(text);
  u.lang = "es-ES"; u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function showComplete() {
  var s = getSong();
  document.getElementById("cards-container").style.display = "none";
  document.getElementById("complete-title").textContent = s.title + " 學完了！";
  document.getElementById("complete-sub").textContent = s.artist + " · " + s.zh;
  document.getElementById("final-correct").textContent = correctCount;
  document.getElementById("final-words").textContent = wordsUnlocked;
  document.getElementById("final-xp").textContent = totalXP;
  var nextBtn = document.getElementById("btn-next");
  if (currentSongIdx < SONGS.length - 1) {
    nextBtn.textContent = "下一首：" + SONGS[currentSongIdx+1].title + " →";
    nextBtn.style.display = "block";
  } else {
    nextBtn.style.display = "none";
  }
  document.getElementById("complete-screen").classList.add("show");
}

function restart() {
  document.getElementById("complete-screen").classList.remove("show");
  checkedCards.clear(); unlockedWords.clear();
  correctCount = 0; wordsUnlocked = 0; streakCount = 0; totalXP = 0;
  document.getElementById("streak-badge").style.display = "none";
  document.getElementById("cards-container").style.display = "";
  updateStats();
  renderCards();
  window.scrollTo(0,0);
}

function nextSong() {
  if (currentSongIdx < SONGS.length - 1) initSong(currentSongIdx + 1);
}

initSong(0);

</script>
</body>
</html>
